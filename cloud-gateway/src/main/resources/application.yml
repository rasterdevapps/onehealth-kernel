server:
  port: 8080

spring:
  application:
    name: cloud-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public.pem
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: ${IDENTITY_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: authorization-service
          uri: ${AUTHORIZATION_URI:http://localhost:8082}
          predicates:
            - Path=/api/roles/**, /api/permissions/**
        - id: tenant-service
          uri: ${TENANT_URI:http://localhost:8083}
          predicates:
            - Path=/api/tenants/**
        - id: config-service
          uri: ${CONFIG_URI:http://localhost:8084}
          predicates:
            - Path=/api/config/**
        - id: audit-service
          uri: ${AUDIT_URI:http://localhost:8085}
          predicates:
            - Path=/api/audit/**
      default-filters:
        - PreserveHostHeader

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
