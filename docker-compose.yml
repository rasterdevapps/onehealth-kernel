version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: erp_kernel
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_kernel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloud-gateway:
    build:
      context: .
      dockerfile: cloud-gateway/Dockerfile
    container_name: erp-gateway
    ports:
      - "8080:8080"
    environment:
      IDENTITY_URI: http://identity-service:8081
      AUTHORIZATION_URI: http://authorization-service:8082
      TENANT_URI: http://tenant-service:8083
      CONFIG_URI: http://config-service:8084
      AUDIT_URI: http://audit-service:8085
    depends_on:
      - identity-service
      - authorization-service
      - tenant-service
      - config-service
      - audit-service

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: erp-identity
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/erp_kernel
      DB_USER: erp
      DB_PASS: erp
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  authorization-service:
    build:
      context: .
      dockerfile: authorization-service/Dockerfile
    container_name: erp-authorization
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/erp_kernel
      DB_USER: erp
      DB_PASS: erp
    depends_on:
      postgres:
        condition: service_healthy

  tenant-service:
    build:
      context: .
      dockerfile: tenant-service/Dockerfile
    container_name: erp-tenant
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/erp_kernel
      DB_USER: erp
      DB_PASS: erp
    depends_on:
      postgres:
        condition: service_healthy

  config-service:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    container_name: erp-config
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/erp_kernel
      DB_USER: erp
      DB_PASS: erp
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    container_name: erp-audit
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/erp_kernel
      DB_USER: erp
      DB_PASS: erp
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
